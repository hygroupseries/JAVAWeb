<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>员工登录</title>
    <style>
        body { font-family: 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); width: 350px; }
        h2 { text-align: center; color: #333; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #666; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #764ba2; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #5b3a7d; }
        .link { text-align: center; margin-top: 15px; }
        .link a { color: #764ba2; text-decoration: none; }
    </style>
</head>
<body>
<div class="container">
    <h2>🔐 员工登录</h2>
    <form action="/login" method="post">
        <div class="form-group">
            <label>员工 ID</label>
            <input type="text" name="empId" required placeholder="请输入员工 ID">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" name="empPassword" required placeholder="请输入密码">
        </div>
        <button type="submit">安全登录</button>
    </form>
    <div class="link">
        没有账号？<a href="register.html">去注册</a>
    </div>
</div>
</body>
</html>
