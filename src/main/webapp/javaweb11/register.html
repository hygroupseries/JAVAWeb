<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>员工注册</title>
    <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <p>Employee Portal</p>
            <h1>员工注册</h1>
            <span>创建新的员工账号</span>
        </div>
        <form action="../register" method="post">
            <div class="form-field">
                <label for="registerEmpId">员工 ID</label>
                <input id="registerEmpId" type="text" name="empId" required placeholder="请输入员工 ID" autocomplete="username">
            </div>
            <div class="form-field">
                <label for="empName">姓名</label>
                <input id="empName" type="text" name="empName" required placeholder="请输入姓名" autocomplete="name">
            </div>
            <div class="form-field">
                <label for="registerPassword">密码</label>
                <input id="registerPassword" type="password" name="empPassword" required placeholder="请输入密码" autocomplete="new-password">
            </div>
            <div class="form-field">
                <label for="empAge">年龄</label>
                <input id="empAge" type="number" name="empAge" required placeholder="请输入年龄" min="18" max="99">
            </div>
            <div class="form-field">
                <label for="empSalary">工资</label>
                <input id="empSalary" type="number" step="0.01" name="empSalary" required placeholder="请输入工资">
            </div>
            <button class="btn" type="submit">立即注册</button>
        </form>
        <div class="auth-footer">
            已有账号？<a href="login.html">去登录</a>
        </div>
    </div>
</div>
</body>
</html>
